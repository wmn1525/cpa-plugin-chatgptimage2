# CPA 必须启用原生动态库插件。
plugins:
  enabled: true
  dir: "plugins"
  configs:
    cpaimage:
      enabled: true
      priority: 100
      base_url: "https://chatgpt.com"
      request_timeout: "20m"
      proxy_url: ""
      cf_cookies: ""
      cleanup_conversation: true
      # 商店构建已内嵌助手；只有调试外部助手时才配置 helper_path。
