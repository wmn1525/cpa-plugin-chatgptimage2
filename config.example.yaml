# CPA 必须启用原生动态库插件。
plugins:
  enabled: true
  dir: "plugins"
  configs:
    cpaimage:
      enabled: true
      priority: 100
      base_url: "https://chatgpt.com"
      request_timeout: "20m"
      proxy_url: ""
      cf_cookies: ""
      cleanup_conversation: true
      # Windows CPA 会把 DLL 复制到临时目录加载，因此建议配置助手绝对路径。
      helper_path: "C:/CLIProxyAPI/plugins/windows/amd64/cpaimage-helper.exe"

